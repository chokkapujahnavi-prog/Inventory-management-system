{% extends "base.html" %}
{% block title %}Add Product{% endblock %}
{% block content %}
  <div class="page-head">
    <div>
      <h1>Add Product</h1>
      <p class="subhead">Enter a new line item for the stockroom.</p>
    </div>
  </div>

  <form class="form-panel" method="post">
    <div class="field">
      <label for="product_id">Product ID</label>
      <input id="product_id" name="product_id" type="text" required value="{{ form.product_id if form else '' }}">
      <div class="hint">Must be unique — e.g. P006</div>
    </div>
    <div class="field">
      <label for="name">Product Name</label>
      <input id="name" name="name" type="text" required value="{{ form.name if form else '' }}">
    </div>
    <div class="field">
      <label for="category">Category</label>
      <input id="category" name="category" type="text" required value="{{ form.category if form else '' }}">
    </div>
    <div class="field">
      <label for="price">Price</label>
      <input id="price" name="price" type="number" step="0.01" min="0" required value="{{ form.price if form else '' }}">
    </div>
    <div class="field">
      <label for="quantity">Quantity Available</label>
      <input id="quantity" name="quantity" type="number" step="1" min="0" required value="{{ form.quantity if form else '' }}">
    </div>
    <div class="field">
      <label for="supplier">Supplier Name</label>
      <input id="supplier" name="supplier" type="text" required value="{{ form.supplier if form else '' }}">
    </div>
    <button class="btn btn-primary" type="submit">Add to Inventory</button>
    <a class="btn" href="{{ url_for('list_products') }}">Cancel</a>
  </form>
{% endblock %}
