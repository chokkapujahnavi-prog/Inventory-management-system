{% extends "base.html" %}
{% block title %}Edit {{ product.product_id }}{% endblock %}
{% block content %}
  <div class="page-head">
    <div>
      <h1>Edit <span class="tag">{{ product.product_id }}</span></h1>
      <p class="subhead">Update details, or add stock, for this item.</p>
    </div>
  </div>

  <form class="form-panel" method="post" action="{{ url_for('update_product', product_id=product.product_id) }}">
    <div class="field">
      <label for="name">Product Name</label>
      <input id="name" name="name" type="text" value="{{ product.name }}">
    </div>
    <div class="field">
      <label for="category">Category</label>
      <input id="category" name="category" type="text" value="{{ product.category }}">
    </div>
    <div class="field">
      <label for="price">Price</label>
      <input id="price" name="price" type="number" step="0.01" min="0" value="{{ product.price }}">
    </div>
    <div class="field">
      <label for="quantity">Quantity</label>
      <input id="quantity" name="quantity" type="number" step="1" min="0" value="{{ product.quantity }}">
    </div>
    <button class="btn btn-primary" type="submit">Save Changes</button>
    <a class="btn" href="{{ url_for('list_products') }}">Cancel</a>
  </form>

  <h2 style="margin-top:34px;">Add Stock</h2>
  <form class="form-panel" method="post" action="{{ url_for('add_stock', product_id=product.product_id) }}">
    <div class="field">
      <label for="amount">Units to add</label>
      <input id="amount" name="amount" type="number" step="1" min="1" required>
    </div>
    <button class="btn btn-primary" type="submit">Add Stock</button>
  </form>
{% endblock %}
